<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tea House</title>
    <!-- add google font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Noto+Serif:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
      * {
        font-family: "Manrope", sans-serif;
      }
    </style>
  </head>
  <body>
    <div class="container border-amber-400 border mx-auto">
      <section class="banner grid grid-cols-2">
        <div class="left-banner space-y-[30px]">
          <h1 class="text-[80px] font-bold">
            It's good <br />
            tea time at The <br />Tea House
          </h1>
          <p class="text-[#777777]">
            Tea and Botanical Solutions Supplier Give Optimum <br />
            Satisfaction To Your Taste Buds.
          </p>
          <button
            class="py-3 px-5 rounded-md text-white font-semibold bg-linear-to-r from-[#ff8938] to-[#ff0000]"
          >
            Explore More
            <span class="-rotate-45 inline-block"
              ><i class="fa-solid fa-arrow-right-long"></i
            ></span>
          </button>
        </div>

        <div
          class="right-banner flex justify-end items-end bg-purple-500 relative"
        >
          <img src="./images/banner.png" alt="banner" />
          <div
            class="rating bg-white rounded-xl shadow-2xl flex justify-center items-center gap-2 absolute w-[250px] left-[220px] bottom-[10px] py-[25px] px-[15px]"
          >
            <i class="fa-solid fa-star text-4xl text-yellow-400"></i>
            <div class="rating-content">
              <h2 class="font-bold text-4xl">5.00</h2>
              <p>Trust Rating</p>
            </div>
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
