<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Faugei - Always Fresh Flowers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./style.css" />
    <style type="text/tailwindcss">
      :root {
        --theme-color-gray: #f5f8ff;
        --theme-color-orange: #e95a08;
        --theme-color-text: rgba(0, 0, 0, 0.5);
      }
      .font-inter {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>
  <body
    class="bg-[var(--theme-color-gray)] py-8 text-lg font-inter text-[var(--theme-color-text)]"
  >
    <div class="main w-[90%] lg:w-[80%] mx-auto">
      <header class="flex justify-between items-center">
        <div class="logo"><img src="/assets/logo.png" alt="Faugei" /></div>
        <nav class="flex justify-center items-center gap-15 capitalize">
          <ul class="flex justify-center items-center gap-8 []">
            <li class="text-black"><a href="#">Home</a></li>
            <li><a href="#">Shop</a></li>
            <li><a href="#">About US</a></li>
          </ul>
          <div class="cart flex justify-center items-center gap-1 text-black">
            <svg
              class="w-6 h-6 stroke-4"
              viewBox="0 0 90 90"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <!-- Cart body -->
              <path
                d="M74.4 66.93H27.28c-3.49 0-5.55-2.66-5.78-5.3-.18-2.06.74-4.33 2.79-5.5L16.75 22.34c-.13-.6.01-1.21.39-1.69.38-.47.95-.75 1.56-.75H88c.65 0 1.26.31 1.63.84.38.53.47 1.21.26 1.82l-7.98 22.88a8 8 0 0 1-6.41 5.44l-48.52 8.48c-1.5.27-1.51 1.54-1.47 1.93.03.39.26 1.64 1.79 1.64H74.4"
              />
              <!-- Wheels -->
              <circle cx="27.85" cy="76.85" r="6.56" />
              <circle cx="68.85" cy="76.85" r="6.56" />
              <!-- Handle -->
              <path
                d="M18.7 23.9a2 2 0 0 1-1.95-1.56l-1.41-6.3a6.6 6.6 0 0 0-6.43-5.15H2"
              />
            </svg>

            cart
            <span>($56)</span>
          </div>
        </nav>
      </header>
    </div>
  </body>
</html>
